<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>PetalPure | Contact Us</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@400;500&display=swap"
    rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/contact.css">
</head>

<body>
  <style>
    :root {
      --blush-pink: #F2B6C1;
      --soft-pink: #F8D7DD;
      --white: #FFFFFF;
      --dark-text: #2C2C2C;
      --light-text: #777777;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--white);
      color: var(--dark-text);
    }

    /* NAVBAR */
    .custom-navbar {
      background-color: var(--white);
      padding: 15px 0;
    }

    .navbar-brand {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      color: var(--blush-pink);
    }

    .nav-link {
      color: var(--dark-text);
      margin-left: 20px;
    }

    .nav-link.active,
    .nav-link:hover {
      color: var(--blush-pink);
    }

    /* HEADER */
    .page-header {
      background-color: var(--soft-pink);
      padding: 60px 0;
    }

    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 42px;
    }

    .page-header p {
      color: var(--light-text);
    }

    /* CONTACT */
    .contact-section {
      padding: 60px 0;
    }

    .contact-info {
      background: var(--soft-pink);
      padding: 30px;
      border-radius: 15px;
    }

    .contact-form {
      background: var(--white);
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.08);
    }

    .form-control {
      border-radius: 10px;
    }

    .btn-petal {
      background-color: var(--blush-pink);
      color: var(--white);
      padding: 10px 25px;
      border-radius: 30px;
      border: none;
    }

    .btn-petal:hover {
      background-color: #e29aa8;
    }

    /* FOOTER */
    .footer {
      background-color: var(--soft-pink);
      text-align: center;
      padding: 20px;
      margin-top: 40px;
    }
  </style>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg custom-navbar">
    <div class="container">
      <a class="navbar-brand" href="home.html">PetalPure</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- HEADER -->
  <section class="page-header">
    <div class="container text-center">
      <h1>Contact Us</h1>
      <p>We’d love to hear from you 🌸</p>
    </div>
  </section>

  <!-- CONTACT SECTION -->
  <section class="contact-section">
    <div class="container">
      <div class="row g-4">

        <!-- Contact Info -->
        <div class="col-md-5">
          <div class="contact-info">
            <h3>Get in Touch</h3>
            <p>Have questions or feedback? Reach out to us anytime.</p>

            <p><strong>Email:</strong> support@petalpure.com</p>
            <p><strong>Phone:</strong> +91 98765 43210</p>
            <p><strong>Instagram:</strong> @petalpurebeauty</p>
          </div>
        </div>

        <!-- Contact Form -->
        <div class="col-md-7">
          <div class="contact-form">
            <form id="contactForm">
              <div class="mb-3">
                <label class="form-label">Your Name</label>
                <input type="text" class="form-control" required>
              </div>

              <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" required>
              </div>

              <div class="mb-3">
                <label class="form-label">Message</label>
                <textarea class="form-control" rows="4" required></textarea>
              </div>

              <button type="submit" class="btn btn-petal">Send Message</button>
            </form>
          </div>
        </div>

      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <p>© 2026 PetalPure. All Rights Reserved.</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Custom JS -->
  <script>
    // Contact form submit message
    document.getElementById("contactForm").addEventListener("submit", function (e) {
      e.preventDefault();
      alert("🌸 Thank you for contacting PetalPure! We’ll get back to you soon.");
      this.reset();
    });

  </script>

</body>

</html>
